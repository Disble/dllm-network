run:
  timeout: 3m

linters:
  disable-all: true
  enable:
    - govet
    - staticcheck
    - errcheck
    - ineffassign
    - depguard

linters-settings:
  depguard:
    rules:
      # Domain purity (design D5/D8): the inference domain type must stay
      # free of any storage driver or transport concern. It is constructed,
      # compared, and passed by value across every other package — coupling
      # it to database/sql or the MCP SDK would force every consumer
      # (including internal/store.Recent's in-memory ring) to drag in a
      # storage or transport dependency it does not need.
      inference-domain-purity:
        files:
          - "**/internal/telemetry/inference/**"
        deny:
          - pkg: "database/sql"
            desc: "internal/telemetry/inference is a driver-free domain type; persistence concerns belong in internal/store/sqlite"
          - pkg: "github.com/modelcontextprotocol/go-sdk"
            desc: "internal/telemetry/inference is transport-free; MCP wiring belongs in internal/mcp"

      # MCP read-side isolation (design D6/D8): internal/mcp depends only on
      # the store.InferenceReader port. Importing internal/capture would let
      # the read-only MCP surface reach back into the write-side capture
      # pipeline, breaking the read/write separation the WAL single-writer
      # design (D3) depends on.
      mcp-not-capture:
        files:
          - "**/internal/mcp/**"
        deny:
          - pkg: "ollama-telemetry/internal/capture"
            desc: "internal/mcp is read-only and must not depend on the write-side capture pipeline; depend on store.InferenceReader instead"

      # SDK isolation (design D6/D8): the MCP SDK is a transport/protocol
      # detail. Confining it to internal/mcp keeps every other package
      # (store, persistence, app, capture) testable and buildable without
      # the SDK, and keeps a future second transport (e.g. HTTP) from
      # leaking SDK types into domain or wiring code.
      sdk-confined-to-mcp:
        files:
          - "**"
          - "!**/internal/mcp/**"
        deny:
          - pkg: "github.com/modelcontextprotocol/go-sdk"
            desc: "the MCP SDK must stay confined to internal/mcp; every other package should depend on store.InferenceReader/InferenceWriter instead"

issues:
  exclude-dirs:
    - frontend
    - tools
  exclude-rules:
    # Pre-existing finding in a root-level scaffold test, unrelated to
    # mcp-serving (last touched in a3f3f1b, long before this lint config
    # existed). Out of scope to fix here — scope discipline carried from
    # every prior mcp-serving slice keeps edits confined to this change's
    # own files. Narrowly excluded rather than silenced project-wide.
    - path: scaffold_test\.go
      linters:
        - ineffassign
        - staticcheck
