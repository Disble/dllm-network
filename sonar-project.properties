# =============================================================================
# dllm-network — SonarQube configuration
# =============================================================================
# Multi-language project: Go backend + TypeScript/React frontend (Wails v2)
#
# Usage:
#   sonar-scanner
#
# Prerequisites:
#   - SonarQube server with Go and TypeScript analyzers installed
#   - Coverage: run tests with coverage BEFORE scanning:
#       go test -coverprofile=coverage.out ./...
#       cd frontend && bun vitest run --coverage
# =============================================================================

sonar.projectKey=dllm-network
sonar.projectName=dllm-network
sonar.projectVersion=1.0.0

# =============================================================================
# Source directories
# =============================================================================
# Root contains Go code; frontend/src contains TypeScript/React code.
sonar.sources=.,frontend/src

# =============================================================================
# Test directories
# =============================================================================
sonar.tests=.,frontend/src

# =============================================================================
# Exclusions
# =============================================================================
sonar.exclusions=\
  **/*_test.go,\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/__tests__/**,\
  **/mock*,\
  **/fake*,\
  **/fakereader*,\
  **/node_modules/**,\
  **/dist/**,\
  build/**,\
  tools/**,\
  poc/**,\
  docs/**, \
  frontend/wailsjs/**,\
  .atl/**, \
  .ignore/**, \
  scripts/**, \
  coverage*, \
  dash-cov, \
  activity-cov

# =============================================================================
# Test exclusions (excluded from coverage but included in analysis)
# =============================================================================
sonar.test.exclusions=\
  **/*_test.go,\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/__tests__/**,\
  **/mock*.go,\
  **/fake*.go,\
  **/fakereader*.go

# =============================================================================
# Go analyzer
# =============================================================================
sonar.go.coverage.reportPaths=coverage.out
sonar.go.tests=.

# =============================================================================
# TypeScript / JavaScript analyzer
# =============================================================================
sonar.typescript.lcov.reportPaths=frontend/coverage/lcov.info
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
sonar.typescript.exclusions=frontend/wailsjs/**,frontend/dist/**,frontend/coverage/**
sonar.javascript.exclusions=frontend/wailsjs/**,frontend/dist/**,frontend/coverage/**

# =============================================================================
# Encoding
# =============================================================================
sonar.sourceEncoding=UTF-8

# =============================================================================
# Issue suppression
# =============================================================================
# S8564 — Wails stores bun.lock in frontend/, not at project root. The text
# analyzer expects a lock file next to root package.json, which is a false
# positive for Wails projects.
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=text:S8564
sonar.issue.ignore.multicriteria.e1.resourceKey=**/package.json

# =============================================================================
# SCM
# =============================================================================
sonar.scm.provider=git
